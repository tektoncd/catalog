---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: github-add-comment-test
spec:
  params:
    - name: API_PATH_PREFIX
      type: string
      default: ""
    - name: EXPECTED_COMMENT_ID
      type: string
      default: "2222222222"
  workspaces:
    - name: comment-file
      optional: true
  tasks:
    - name: add-comment
      taskRef:
        name: github-add-comment
      workspaces:
        - name: comment-file
          workspace: comment-file
      params:
        - name: GITHUB_HOST_URL
          value: http://127.0.0.1:8080
        - name: API_PATH_PREFIX
          value: $(params.API_PATH_PREFIX)
        - name: COMMENT_OR_FILE
          value: "Hello from TektonCD test"
        - name: REQUEST_URL
          value: https://github.com/tektoncd/catalog/issues/1
        - name: REPLACE
          value: "true"
        - name: COMMENT_TAG
          value: TEST_TAG123
    - name: verify-result
      runAfter:
        - add-comment
      params:
        - name: EXPECTED_COMMENT_ID
          value: $(params.EXPECTED_COMMENT_ID)
        - name: ACTUAL_COMMENT_ID
          value: $(tasks.add-comment.results.COMMENT_ID)
        - name: ACTUAL_COMMENT_URL
          value: $(tasks.add-comment.results.COMMENT_URL)
      taskSpec:
        params:
          - name: EXPECTED_COMMENT_ID
            type: string
          - name: ACTUAL_COMMENT_ID
            type: string
          - name: ACTUAL_COMMENT_URL
            type: string
        steps:
          - image: registry.access.redhat.com/ubi8/ubi-minimal:8.2
            script: |
              #!/usr/libexec/platform-python

              assert "$(params.EXPECTED_COMMENT_ID)" == "$(params.ACTUAL_COMMENT_ID)"
              assert "$(params.ACTUAL_COMMENT_URL)".startswith("https://")
---
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: github-add-comment-test-run
spec:
  pipelineRef:
    name: github-add-comment-test
---
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: github-add-comment-test-run-ghe
spec:
  pipelineRef:
    name: github-add-comment-test
  params:
    - name: API_PATH_PREFIX
      value: "/api/v3"
    - name: EXPECTED_COMMENT_ID
      value: "2222222222"
